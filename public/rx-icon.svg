<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#16161f"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Two-tone rounded rectangle background (like the reference icon) -->
  <!-- Left half: dark -->
  <path d="M56 56 L256 56 L256 456 L56 456 Q40 456 40 440 L40 72 Q40 56 56 56 Z" fill="url(#leftGrad)" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.3"/>
  <!-- Right half: cyan -->
  <path d="M256 56 L456 56 Q472 56 472 72 L472 440 Q472 456 456 456 L256 456 Z" fill="url(#rightGrad)"/>
  <!-- Thin white divider -->
  <line x1="256" y1="56" x2="256" y2="456" stroke="#ffffff" stroke-width="2" stroke-opacity="0.15"/>

  <!-- "R" glyph on dark side (cyan) -->
  <g filter="url(#glow)">
    <path d="M100 160 L100 352 L150 352 L150 280 L200 352 L260 352 L195 268
             Q225 252 225 215 Q225 160 165 160 Z
             M150 200 L170 200 Q185 200 185 215 Q185 230 170 230 L150 230 Z"
          fill="#22d3ee"/>
  </g>

  <!-- "X" glyph on cyan side (dark) -->
  <path d="M300 160 L345 160 L375 205 L405 160 L450 160 L400 230 L450 320
           L405 320 L375 275 L345 320 L300 320 L350 230 Z"
        fill="#0a0a0f" opacity="0.9"/>

  <!-- Small accent dot -->
  <circle cx="256" cy="400" r="4" fill="#ec4899"/>
</svg>
