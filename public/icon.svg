<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#16161f"/>
    </linearGradient>
    <linearGradient id="rx-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="rx-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Cyan border -->
  <rect x="24" y="24" width="464" height="464" rx="96" fill="none"
        stroke="url(#rx-cyan)" stroke-width="4" opacity="0.5"/>

  <!-- "R" glyph -->
  <g filter="url(#glow)">
    <path d="M150 152 L150 360 L210 360 L210 280 L260 360 L330 360 L265 268
             Q300 252 300 210 Q300 152 230 152 Z
             M210 200 L235 200 Q250 200 250 215 Q250 230 235 230 L210 230 Z"
          fill="url(#rx-cyan)"/>
    <!-- "X" glyph -->
    <path d="M340 152 L390 152 L420 200 L450 152 L500 152 L440 240 L500 360
             L450 360 L420 290 L390 360 L340 360 L400 240 Z"
          fill="url(#rx-purple)" transform="translate(-110,0)"/>
  </g>

  <!-- Subtle accent dot -->
  <circle cx="256" cy="430" r="6" fill="#ec4899" opacity="0.9"/>
</svg>
