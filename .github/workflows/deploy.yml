name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed by actions/configure-pages, upload-pages-artifact, deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deployments so only one runs at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # vite.config.ts reads this to set the /robloxxea/ base path
          GITHUB_ACTIONS: 'true'
          # Point the app at the live data repo so tools load from
          # https://github.com/M7mD0X/robloxxea-data and stay auto-verified.
          VITE_MAIN_TOOLS_URL: 'https://raw.githubusercontent.com/M7mD0X/robloxxea-data/main/mainTools.json'
          VITE_COMMUNITY_TOOLS_URL: 'https://raw.githubusercontent.com/M7mD0X/robloxxea-data/main/communityTools.json'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
