    <link rel="icon" type="image/png" href="./rx-icon.png" />
    <link rel="apple-touch-icon" href="./rx-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="RobloxXea — Advanced mobile-first PWA toolkit for Roblox scripters." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>RobloxXea — Roblox Scripter Toolkit</title>

    <!--
      SPA redirect-decode script (counterpart to public/404.html).
      Runs BEFORE the React bundle so the URL is restored to its pre-404 form
      before React Router reads it. Must be inline and synchronous.
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
  </head>
  <body class="bg-void-900 text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
